services:
  samba:
    image: dockurr/samba:4.23
    container_name: samba-mochi
    restart: unless-stopped

    # host network so smbd can bind directly to tailscale0 (per smb.conf)
    network_mode: host

    # image filesystem is immutable; everything writable lives in tmpfs
    read_only: true
    tmpfs:
      - /tmp
      - /var/log/samba
      - /var/run/samba
      - /var/lib/samba/private
      - /var/cache/samba

    cap_drop: [ALL]
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true

    env_file: .env

    volumes:
      - /home/daniel/GitRepos/Italian/backups:/srv/backups
      - ./smb.conf:/etc/samba/smb.conf:ro
